- name: "Create logs folder"
  become: yes
  file:
    path: "{{ logfile | dirname }}"
    owner: "{{ sfa_enduro_worker_system_user }}"
    group: "{{ sfa_enduro_worker_system_group }}"
    mode: 0755
    state: "directory"

- name: "Configure rsyslog"
  template:
    src: templates/rsyslog.conf.j2
    dest: /etc/rsyslog.d/{{ rsyslog_order }}-{{ conf_files_name }}.conf
  notify: restart rsyslog

- name: "Configure log rotation"
  template:
    src: templates/logrotate.conf.j2
    dest: /etc/logrotate.d/{{ conf_files_name }}
